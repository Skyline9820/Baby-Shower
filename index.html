<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Baby Shower!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            background-image: repeating-linear-gradient(90deg, 
                #ffffff, 
                #ffffff 30px, 
                #e8f1f9 30px, 
                #e8f1f9 60px
            );
            color: #2b3a4a;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- LIMONES FLOTANTES --- */
        .decorations-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 0;
        }
        .leaf-lemon {
            position: absolute; font-size: 24px; opacity: 0.8;
            animation: floatDecoration 6s ease-in-out infinite alternate;
        }
        @keyframes floatDecoration {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(15deg); }
        }

        /* --- SECCIÓN HERO (SOBRE) --- */
        #hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .showcase-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        #img-cerrado {
            position: absolute; width: 1000px; cursor: pointer; z-index: 5;
            transition: opacity 0.6s ease, transform 0.6s ease;
            animation: float 3s ease-in-out infinite;
        }
        #img-cerrado:hover { transform: scale(1.03); }

        .split-view {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
        }

        #img-abierto, #img-tarjeta {
            position: absolute; width: 450px; 
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(4px 4px 6px rgba(28, 61, 90, 0.4));
        }

        #img-abierto { transform: translateX(0) scale(0.8) rotate(-5deg); }
        #img-tarjeta { transform: translateX(0) scale(0.8) rotate(5deg); }

        #hero.opened #img-cerrado { opacity: 0; transform: scale(0.8) translateY(20px); pointer-events: none; }
        #hero.opened .split-view { opacity: 1; pointer-events: auto; }
        #hero.opened #img-abierto { transform: translate(-240px, -40px) scale(1.15) rotate(-3deg); }
        #hero.opened #img-tarjeta { transform: translate(240px, 50px) scale(1) rotate(2deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .scroll-indicator {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex; flex-direction: column;
            align-items: center; opacity: 0; pointer-events: none;
            transition: opacity 1s ease-out 0.5s;
        }

        .scroll-indicator span {
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 3px; color: #1c3d5a;
            margin-bottom: 5px; font-weight: 600;
        }

        .scroll-indicator svg { width: 30px; height: 30px; animation: bounceArrow 2s infinite; }
        
        /* CORRECCIÓN 1: Hacemos el indicador clickeable al abrir el sobre */
        #hero.opened .scroll-indicator { opacity: 1; pointer-events: auto; cursor: pointer; }

        @keyframes bounceArrow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main-content {
            position: relative; z-index: 5; 
            max-width: 100%; 
            margin: 0 auto; 
            padding: 20px 4vw 140px 4vw; 
            opacity: 0; transform: translateY(40px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        #main-content.show { opacity: 1; transform: translateY(0); }

        /* Estilo base para elementos */
        .invitation-element {
            position: relative;
            width: 100%;
            max-width: 950px; 
            margin-bottom: 40px; 
            filter: drop-shadow(0 15px 30px rgba(165, 193, 216, 0.3));
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* TAMAÑOS ESPECIALES */
        .img-hora { max-width: 1150px !important; }
        .img-maps { max-width: 1150px !important; }
        .wrapper-regalo { max-width: 1350px !important; display: flex; flex-direction: column; } 

        /* Alternando rotación */
        .invitation-element:nth-child(odd) { transform: rotate(-2.5deg); }
        .invitation-element:nth-child(even) { transform: rotate(2.5deg); }

        /* Efecto al pasar el ratón */
        .invitation-element:hover { 
            transform: rotate(0deg) scale(1.02) !important; 
            z-index: 50 !important; 
            filter: drop-shadow(0 20px 40px rgba(165, 193, 216, 0.5));
        }

        .section-image { width: 100%; height: auto; display: block; }
        .image-link { display: block; text-decoration: none; }

        /* --- IMAGEN SAVE THE DATE CON CRONÓMETRO DENTRO --- */
        .save-the-date-card {
            background-image: url('save.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            aspect-ratio: 4 / 3; 
        }

        .absolute-wrapper {
            position: absolute;
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }

        .countdown-container { 
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 20px; width: 100%;
        }

        .countdown-wrapper { display: flex; flex-direction: column; align-items: center; }

        .countdown-box { 
            background: transparent; border: 2px solid #4a728a; 
            width: 95px; height: 110px; position: relative;
            margin-bottom: 15px; display: flex; justify-content: center; align-items: center;
        }

        .countdown-box::before, .countdown-box::after {
            content: ''; position: absolute; width: 10px; height: 10px; background: #faf9f6; 
        }
        .countdown-box::before { top: -2px; left: -2px; border-right: 2px solid #4a728a; border-bottom: 2px solid #4a728a; }
        .countdown-box::after { bottom: -2px; right: -2px; border-left: 2px solid #4a728a; border-top: 2px solid #4a728a; }

        .countdown-number { 
            font-family: 'Cinzel', serif; font-size: 3.5rem; 
            color: #4a728a; line-height: 1; position: relative; z-index: 2;
        }

        .countdown-separator { font-family: 'Cinzel', serif; font-size: 2.8rem; color: #4a728a; line-height: 2.2; }
        .countdown-heart { color: #4a728a; font-size: 1.1rem; margin-bottom: 5px; }
        .countdown-label { 
            font-family: 'Cinzel', serif; font-size: 0.9rem; 
            text-transform: uppercase; letter-spacing: 1px; color: #4a728a; font-weight: 700;
        }

        /* --- TEXTO DEL MAPA --- */
        .map-text {
            text-align: center;
            color: #4a728a;
            margin-bottom: 15px;
            margin-top: 10px;
            z-index: 5;
            position: relative;
            transform: rotate(-1.5deg);
        }
        
        .map-text h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .map-text p {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* --- BOTÓN ELEGANTE --- */
        .btn-elegant {
            background-color: rgba(255, 255, 255, 0.5);
            color: #4a728a; border: 2px solid #4a728a;
            padding: 14px 30px; border-radius: 30px;
            font-size: 0.95rem; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 2px;
            text-decoration: none; font-weight: 700;
            transition: all 0.3s ease; margin-top: 25px; 
            box-shadow: 0 5px 15px rgba(28, 61, 90, 0.1);
        }

        .btn-elegant:hover {
            background-color: #4a728a; color: #ffffff; transform: scale(1.05);
        }

        /* --- CONTENEDOR INTEGRADO MESA DE REGALOS + AMAZON/LIVERPOOL --- */
        .stores-positioner {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            margin-top: -120px; 
        }

        .stores-wrapper {
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            width: 55%; 
            z-index: 10;
            transform: translateX(40px);
        }

        .store-link {
            width: 140px; height: 140px; 
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            position: relative;
            overflow: visible; 
        }
        
        .store-link:hover { transform: translateY(-8px); }
        
        .store-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 8px 15px rgba(165, 193, 216, 0.25)); 
        }
        .store-link:hover .store-img { 
            transform: scale(1.05); 
            filter: drop-shadow(0 12px 25px rgba(165, 193, 216, 0.35));
        }

        .manita-sticker {
            position: absolute;
            bottom: -55px; 
            left: 50%; 
            width: 45px; 
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 5px 8px rgba(28, 61, 90, 0.3));
            animation: bounceSticker 1s infinite alternate;
        }

        @keyframes bounceSticker {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(8px); }
        }

        /* --- RESPONSIVIDAD PARA MÓVILES --- */
        @media(max-width: 1024px) {
            .stores-positioner { margin-top: -80px; } 
            .stores-wrapper { gap: 20px; width: auto; transform: translateX(0); margin-right: 5%; }
            .store-link { width: 110px; height: 110px; }
            .manita-sticker { width: 35px; bottom: -25px; }
        }

        @media(max-width: 768px) {
            /* 1. Ajuste del Sobre y Tarjeta (Hero) - RECORRIDO HACIA ARRIBA */
            #img-cerrado { width: 82vw; max-width: 290px; } 
            .showcase-wrapper { height: 100vh; margin-top: -12vh; }
            
            #hero.opened #img-abierto { transform: translate(0, -14vh) scale(0.62) rotate(-2deg); z-index: 1; }
            #hero.opened #img-tarjeta { transform: translate(0, 18vh) scale(0.66) rotate(2deg); z-index: 2; }
            
            .scroll-indicator { bottom: 12vh; }
            
            /* 2. Reducción de márgenes globales y AUMENTO del tamaño de imágenes */
            #main-content { padding: 10px 2vw 100px 2vw; } 
            
            .invitation-element { margin-bottom: 25px; width: 95%; max-width: none; } 
            
            .save-the-date-card { width: 85vw !important; max-width: 310px !important; margin: 0 auto 25px auto; }
            
            .img-hora { width: 104% !important; max-width: 104% !important; }
            
            .invitation-element:nth-child(odd) { transform: rotate(-1.5deg); }
            .invitation-element:nth-child(even) { transform: rotate(1.5deg); }

            /* 3. Ajuste texto del mapa para móviles */
            .map-text h2 { font-size: 2rem; }
            .map-text p { font-size: 0.75rem; }

            /* 4. Cronómetro Perfecto - ¡AJUSTADO PARA QUE NO SE AMONTONE! */
            .absolute-wrapper { top: 58%; width: 90%; } 
            .countdown-container { gap: 3px; }
            .countdown-separator { font-size: 1rem; margin-top: 8px; }
            
            /* Cajas más chicas para que quepan bien */
            .countdown-box { width: 11vw; height: 13vw; max-width: 38px; max-height: 44px; padding: 0; margin-bottom: 3px; border-width: 1px;}
            .countdown-box::before, .countdown-box::after { width: 4px; height: 4px; }
            
            /* Números y letras más sutiles */
            .countdown-number { font-size: clamp(0.9rem, 3.5vw, 1.2rem); }
            .countdown-label { font-size: clamp(0.35rem, 1.5vw, 0.45rem); letter-spacing: 0; }
            .countdown-heart { font-size: 0.6rem; margin-bottom: 1px; }

            /* Botón refinado y más pequeño */
            .btn-elegant { 
                font-size: 0.55rem; 
                padding: 7px 12px; 
                margin-top: 8px; 
                border-width: 1px; 
                max-width: 95%; 
                text-align: center; 
                letter-spacing: 1px;
            }
            
            /* 5. Acomodo de las tiendas de regalos (Amazon/Liverpool) */
            .stores-positioner { margin-top: 0; justify-content: center; padding: 0; margin-bottom: 15px;}
            .stores-wrapper { gap: 15px; width: 100%; justify-content: center; transform: translateX(0); }
            
            .store-link { width: 18vw; height: 18vw; max-width: 70px; max-height: 70px; }
            .manita-sticker { width: 22px; bottom: -18px; }
        }
    </style>
</head>
<body>

    <div class="decorations-container">
        <div class="leaf-lemon" style="top: 10%; left: 8%; animation-delay: 0s;"></div>
        <div class="leaf-lemon" style="top: 15%; right: 10%; animation-delay: 1.5s;"></div>
        <div class="leaf-lemon" style="bottom: 20%; left: 5%; animation-delay: 0.5s;"></div>
        <div class="leaf-lemon" style="top: 45%; left: 12%; animation-delay: 3s;"></div>
    </div>

    <div id="hero">
        <div class="showcase-wrapper">
            <img id="img-cerrado" onclick="abrirInvitacion()" src="cerrado.png" alt="Sobre Cerrado"> 
            <div class="split-view">
                <img id="img-abierto" src="sobre.png" alt="Sobre Abierto">
                <img id="img-tarjeta" src="tar.png" alt="Tarjeta Invitación">
            </div>
        </div>
        <div class="scroll-indicator" onclick="deslizarAbajo()">
            <span>Desliza</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="#cca43b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
    </div>

    <div id="main-content">
        
        <img class="invitation-element section-image" src="sbado.png" alt="Día del Evento">

        <img class="invitation-element section-image img-hora" src="hora.png" alt="Hora del Evento">

        <div class="invitation-element save-the-date-card">
            <div class="absolute-wrapper">
                <div class="countdown-container">
                    <div class="countdown-wrapper">
                        <div class="countdown-box"><span class="countdown-number" id="days">00</span></div>
                        <div class="countdown-heart">♥</div>
                        <div class="countdown-label">DÍAS</div>
                    </div>
                    <div class="countdown-separator">·</div>
                    <div class="countdown-wrapper">
                        <div class="countdown-box"><span class="countdown-number" id="hours">00</span></div>
                        <div class="countdown-heart">♥</div>
                        <div class="countdown-label">HORAS</div>
                    </div>
                    <div class="countdown-separator">·</div>
                    <div class="countdown-wrapper">
                        <div class="countdown-box"><span class="countdown-number" id="minutes">00</span></div>
                        <div class="countdown-heart">♥</div>
                        <div class="countdown-label">MINUTOS</div>
                    </div>
                    <div class="countdown-separator">·</div>
                    <div class="countdown-wrapper">
                        <div class="countdown-box"><span class="countdown-number" id="seconds">00</span></div>
                        <div class="countdown-heart">♥</div>
                        <div class="countdown-label">SEGUNDOS</div>
                    </div>
                </div>

                <a href="https://wa.me/5214433072009?text=Confirmo%20que%20asistire%20al%20baby%20shower" target="_blank" class="btn-elegant">
                     Confirma a este número
                </a>
            </div>
        </div>

        <div class="map-text">
            <h2>¿Dónde?</h2>
            <p>(Toca el mapa para abrir la ubicación)</p>
        </div>

        <a href="https://maps.google.com/?q=Santa+Barbara+443+Club+Golf+Tres+Marias+Morelia" target="_blank" class="invitation-element image-link img-maps">
            <img class="section-image" src="maps.png" alt="Abrir en Google Maps">
        </a>

        <div class="invitation-element wrapper-regalo">
            <img class="section-image img-regalo" src="regalito.png" alt="Mesa de Regalos">
            
            <div class="stores-positioner">
                <div class="stores-wrapper">
                    <a href="https://www.amazon.com.mx/baby-reg/karla-arriaga-julio-2026-morelia/2N7XOAY4BZ3CV" target="_blank" class="store-link">
                        <img src="amazon.png" alt="Amazon" class="store-img">
                        <img src="manita.png" alt="Click aquí" class="manita-sticker">
                    </a>

                    <a href="https://mesaderegalos.liverpool.com.mx/milistaderegalos/52004491" target="_blank" class="store-link">
                        <img src="liverpool.png" alt="Liverpool" class="store-img">
                        <img src="manita.png" alt="Click aquí" class="manita-sticker">
                    </a>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        function abrirInvitacion() {
            document.getElementById('hero').classList.add('opened');
            
            const mainContent = document.getElementById('main-content');
            setTimeout(() => {
                mainContent.classList.add('show');
            }, 800); 
        }

        function deslizarAbajo() {
            document.getElementById('main-content').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        const targetDate = new Date(2026, 5, 20, 10, 0, 0).getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;
            if (difference < 0) return;

            document.getElementById('days').innerText = Math.floor(difference / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById('hours').innerText = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById('minutes').innerText = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById('seconds').innerText = Math.floor((difference % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
